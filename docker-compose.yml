version: "3.8"

services:
  # ------------------------------------------------------------------
  # PostgreSQL with pgvector extension
  # ------------------------------------------------------------------
  postgres:
    image: ankane/pgvector:latest
    container_name: bb-postgres
    environment:
      POSTGRES_USER: bbuser
      POSTGRES_PASSWORD: bbpass
      POSTGRES_DB: burdello
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bbuser -d burdello"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - bb-network

  # ------------------------------------------------------------------
  # Qdrant vector store
  # ------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: bb-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    # Qdrant's image ships no curl/wget; bash supports /dev/tcp for a TCP liveness probe.
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - bb-network

  # ------------------------------------------------------------------
  # Redis (cache + Celery broker)
  # ------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: bb-redis
    command: >
      redis-server
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --save ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m
    networks:
      - bb-network

  # ------------------------------------------------------------------
  # Backend API server
  # ------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bb-backend
    # Invoke via `python -m` so it does not depend on the venv console-script
    # shebang (kept correct by the Dockerfile, but this is rebuild-independent).
    command: ["python", "-m", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    # Live source mount: picks up backend code changes without an image rebuild
    # (the image's editable install resolves backend.* from /app/backend).
    volumes:
      - ./backend:/app/backend
      # AI tool transcript dirs, mounted read-only under the container's
      # $HOME (/home/bbuser) where the discovery globs look by default.
      - ${HOME}/.claude:/home/bbuser/.claude:ro
      - ${HOME}/.codex:/home/bbuser/.codex:ro
      - ${HOME}/.kimi:/home/bbuser/.kimi:ro
      - ${HOME}/.vibe:/home/bbuser/.vibe:ro
      - ${HOME}/.gemini:/home/bbuser/.gemini:ro
    environment:
      DATABASE_URL: "postgresql+asyncpg://bbuser:bbpass@postgres:5432/burdello"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "burdello_chunks"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      LITELLM_URL: "${LITELLM_URL:-http://litellm}"
      LITELLM_API_KEY: "${LITELLM_API_KEY:-}"
      BB_LOG_LEVEL: "INFO"
      BB_EMBEDDING_MODEL: "${BB_EMBEDDING_MODEL:-sentence-transformers/all-mpnet-base-v2}"
      BB_MINING_MODEL: "${BB_MINING_MODEL:-claude-haiku-4-5-20251001}"
      BB_CHUNK_SIZE: "512"
      BB_CHUNK_OVERLAP: "50"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2g
    # litellm is a Tailscale node (100.114.245.86 / litellm.tail5d39b4.ts.net).
    # Map the bare hostname so LITELLM_URL=http://litellm resolves in-container.
    extra_hosts:
      - "litellm:100.114.245.86"
    networks:
      - bb-network
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Celery worker
  # ------------------------------------------------------------------
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bb-celery-worker
    command: >
      python -m celery -A backend.pipeline.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=100
      --max-memory-per-child=3000000
      -n worker@%h
    volumes:
      - ./backend:/app/backend
      # Same transcript mounts as the API: the worker runs the pipeline.
      - ${HOME}/.claude:/home/bbuser/.claude:ro
      - ${HOME}/.codex:/home/bbuser/.codex:ro
      - ${HOME}/.kimi:/home/bbuser/.kimi:ro
      - ${HOME}/.vibe:/home/bbuser/.vibe:ro
      - ${HOME}/.gemini:/home/bbuser/.gemini:ro
    # The image HEALTHCHECK curls :8000 (the API); a worker doesn't serve it.
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: "postgresql+asyncpg://bbuser:bbpass@postgres:5432/burdello"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_COLLECTION: "burdello_chunks"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      LITELLM_URL: "${LITELLM_URL:-http://litellm}"
      LITELLM_API_KEY: "${LITELLM_API_KEY:-}"
      BB_LOG_LEVEL: "INFO"
      BB_EMBEDDING_MODEL: "${BB_EMBEDDING_MODEL:-sentence-transformers/all-mpnet-base-v2}"
      BB_MINING_MODEL: "${BB_MINING_MODEL:-claude-haiku-4-5-20251001}"
      BB_CHUNK_SIZE: "512"
      BB_CHUNK_OVERLAP: "50"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Room for 2 worker children each holding the resident embedding
          # model (~1-2GB) plus transient encode/mining memory.
          memory: 6g
    # litellm is a Tailscale node (100.114.245.86 / litellm.tail5d39b4.ts.net).
    extra_hosts:
      - "litellm:100.114.245.86"
    networks:
      - bb-network
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Celery beat (periodic tasks scheduler)
  # ------------------------------------------------------------------
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: bb-celery-beat
    command: >
      python -m celery -A backend.pipeline.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
    volumes:
      - ./backend:/app/backend
    # The image HEALTHCHECK curls :8000 (the API); beat doesn't serve it.
    healthcheck:
      disable: true
    environment:
      DATABASE_URL: "postgresql+asyncpg://bbuser:bbpass@postgres:5432/burdello"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      BB_LOG_LEVEL: "INFO"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256m
    networks:
      - bb-network
    restart: unless-stopped

  # ------------------------------------------------------------------
  # Frontend (React SPA — Vite dev server with live reload)
  # ------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    container_name: bb-frontend
    working_dir: /app
    # Install deps into the named volume on first run, then serve with HMR.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    environment:
      # Vite proxies /api to the backend service over the compose network.
      VITE_API_PROXY: "http://backend:8000"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Container-built node_modules (linux) shadow any host (darwin) ones.
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 1g
    networks:
      - bb-network
    restart: unless-stopped

# ------------------------------------------------------------------
# Volumes
# ------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  redis_data:
    driver: local
  frontend_node_modules:
    driver: local

# ------------------------------------------------------------------
# Networks
# ------------------------------------------------------------------
networks:
  bb-network:
    driver: bridge
